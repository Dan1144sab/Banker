    .sp-amount.pos { color: var(--win); } .sp-amount.neg { color: var(--loss); }
    .hole-log { width: 100%; max-width: 440px; }

    .hole-log-row { background: rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; }
    .hlr-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .hlr-hole { font-family: 'Bebas Neue', sans-serif; color: var(--gold); font-size: 18px; min-width: 36px; }
    .hlr-banker { font-size: 11px; color: rgba(255,255,255,0.45); }
    .hlr-limit { font-size: 11px; color: rgba(255,255,255,0.3); margin-left: auto; }
    .hlr-results { display: flex; gap: 7px; flex-wrap: wrap; }
    .hlr-chip { font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
    .hlr-chip.pos { background: rgba(22,163,74,0.2); color: #4ade80; }
    .hlr-chip.neg { background: rgba(220,38,38,0.2); color: #f87171; }
    .hlr-chip.zero { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }
    .btns-row { display: flex; gap: 12px; }
    .new-game-btn { padding: 15px 32px; background: var(--gold); color: var(--dark); border: none; border-radius: 14px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; cursor: pointer; }

    /* LOADING */
    .loading-overlay { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 16px; }

    .loading-text { color: rgba(255,255,255,0.5); font-size: 13px; letter-spacing: 2px; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDcU1JyPdnQRpACW9TqKCf6IsO1phMxcXo",
  authDomain: "banker-65da3.firebaseapp.com",
  databaseURL: "https://banker-65da3-default-rtdb.firebaseio.com",
  projectId: "banker-65da3",
  storageBucket: "banker-65da3.firebasestorage.app",
  messagingSenderId: "161371273359",
  appId: "1:161371273359:web:d3fd5f25d56f34abd098fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const HOLES = 18;
const BET_OPTIONS = [5, 10, 15, 20, 25, 30, 40, 50, 75, 100];

let state = {
  players: [],
  playerCount: 3,
  holes: [],
  activeHole: 0,
  gameCode: null,
  isSpectator: false,
};

let unsubscribe = null;

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmt(val) {
  if (val === 0) return 'E';
  return (val > 0 ? '+$' : '-$') + Math.abs(val);
}
function esc(str) { return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

function getMultiplier(press) {
  let playerMult = 1;
  if (press.player === 'press') playerMult = 2;
  if (press.player === 'triple') playerMult = 3;
  let m = playerMult;
  if (press.banker) m *= playerMult;
  return m;
}
function getFinalWager(baseWager, press) { return baseWager * getMultiplier(press); }

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

function initHoles(players) {
  return Array.from({ length: HOLES }, (_, i) => ({
    hole: i + 1, banker: null, limitMin: 5, limitMax: 50,
    wagers: Object.fromEntries(players.map(p => [p, null])),
    press: Object.fromEntries(players.map(p => [p, { player: null, banker: false }])),
    strokes: Object.fromEntries(players.map(p => [p, ''])),
    locked: false,
  }));
}

function calcHoleResult(hole) {
  if (!hole.banker) return null;
  const bankerStrokes = Number(hole.strokes[hole.banker]);
  if (!bankerStrokes) return null;
  const results = {};
  let bankerNet = 0;
  state.players.forEach(p => {
    if (p === hole.banker) return;
    const pStrokes = Number(hole.strokes[p]);
    if (!pStrokes || hole.wagers[p] == null) return;
    const finalWager = getFinalWager(hole.wagers[p], hole.press[p]);
    const diff = bankerStrokes - pStrokes;
    let amount = diff > 0 ? finalWager : diff < 0 ? -finalWager : 0;
    results[p] = amount; bankerNet -= amount;
  });
  results[hole.banker] = bankerNet;
  return results;
}

function calcTotals() {
  const totals = Object.fromEntries(state.players.map(p => [p, 0]));
  state.holes.forEach(hole => {
    if (!hole.locked) return;
    const res = calcHoleResult(hole);
    if (!res) return;
    state.players.forEach(p => { totals[p] += res[p] ?? 0; });
  });
  return totals;
}

// ── Firebase sync ─────────────────────────────────────────────────────────────
async function saveToFirebase() {
  if (!state.gameCode) return;
  const gameRef = ref(db, `games/${state.gameCode}`);
  await set(gameRef, { players: state.players, holes: state.holes, activeHole: state.activeHole, updatedAt: Date.now() });
}

function subscribeToGame(code) {
  if (unsubscribe) unsubscribe();
  const gameRef = ref(db, `games/${code}`);
  unsubscribe = onValue(gameRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    state.players = data.players || [];
    state.holes = data.holes || [];
    if (state.isSpectator) {
      state.activeHole = data.activeHole ?? 0;
    }
    renderGame();
  });
}

// ── Setup ─────────────────────────────────────────────────────────────────────
function setCount(n) {
  state.playerCount = n;
  document.querySelectorAll('#count-pills .pill').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === n);
  });
  renderNameInputs();
}

function renderNameInputs() {
  const container = document.getElementById('name-inputs');
  const existing = [...container.querySelectorAll('input')].map(i => i.value);
  container.innerHTML = '';
  for (let i = 0; i < state.playerCount; i++) {
    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'name-input';
    inp.placeholder = `Player ${i + 1}`; inp.value = existing[i] || '';
    inp.style.fontSize = '16px';
    inp.addEventListener('input', checkSetupValid);
    container.appendChild(inp);
  }
  checkSetupValid();
}

function checkSetupValid() {
  const valid = [...document.querySelectorAll('.name-input')].every(i => i.value.trim().length > 0);
  document.getElementById('start-btn').disabled = !valid;
}

async function startGame() {
  state.players = [...document.querySelectorAll('.name-input')].map(i => i.value.trim());
  state.holes = initHoles(state.players);
  state.activeHole = 0;
  state.isSpectator = false;
  state.gameCode = generateCode();
  await saveToFirebase();
  subscribeToGame(state.gameCode);
  document.getElementById('spectator-banner').style.display = 'none';
  document.getElementById('code-display').textContent = state.gameCode;
  showGame(); renderGame();
}

async function joinGame() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (code.length !== 4) return alert('Enter a 4-letter game code');
  const gameRef = ref(db, `games/${code}`);
  const snapshot = await get(gameRef);
  if (!snapshot.exists()) return alert('Game not found. Check the code and try again.');
  const data = snapshot.val();
  state.players = data.players || [];
  state.holes = data.holes || [];
  state.activeHole = data.activeHole ?? 0;
  state.gameCode = code;
  state.isSpectator = true;
  subscribeToGame(code);
  document.getElementById('spectator-banner').style.display = 'block';
  document.getElementById('code-display').textContent = code;
  showGame(); renderGame();
}

// ── Screens ───────────────────────────────────────────────────────────────────
function showScreen(id) {
  ['lobby-screen','game-screen','summary-screen'].forEach(s => {
    document.getElementById(s).classList.toggle('active', s === id);
  });
}
function showGame() { showScreen('game-screen'); renderGame(); }
function newGame() { if(unsubscribe) unsubscribe(); showScreen('lobby-screen'); }
function showSummary() { showScreen('summary-screen'); renderSummary(); }

// expose to global scope for onclick handlers
window.showGame = showGame;
window.newGame = newGame;
window.showSummary = showSummary;
window.joinGame = joinGame;
window.startGame = startGame;
window.setCount = setCount;

// ── Game Render ───────────────────────────────────────────────────────────────
function renderGame() { renderLeaderboard(); renderHoleNav(); renderHoleCard(); }

function renderLeaderboard() {
  const totals = calcTotals();
  const sorted = [...state.players].sort((a, b) => totals[b] - totals[a]);
  const holesPlayed = state.holes.filter(h => h.locked).length;
  document.getElementById('leaderboard').innerHTML = `
    <div class="leaderboard">
      <div class="lb-header"><span class="lb-title">LEADERBOARD</span><span class="lb-sub">${holesPlayed}/18 holes</span></div>
      ${sorted.map((p, i) => {
        const val = totals[p];
        return `<div class="lb-row ${i===0&&val>0?'lb-leader':''}">
          <span class="lb-pos">${i+1}</span><span class="lb-name">${p}</span>
          <span class="lb-amount ${val>0?'pos':val<0?'neg':''}">${fmt(val)}</span></div>`;
      }).join('')}
    </div>`;
}

function renderHoleNav() {
  document.getElementById('hole-nav').innerHTML = state.holes.map((h, i) =>
    `<button class="hn-btn ${h.locked?'done':''} ${i===state.activeHole?'cur':''}" onclick="goHole(${i})">${i+1}</button>`
  ).join('');
}
window.goHole = function(i) {
  state.activeHole = i; renderGame();
  document.getElementById('hole-card-container').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
};

function renderHoleCard() {
  const hole = state.holes[state.activeHole];
  if (!hole) return;
  const isLocked = hole.locked;
  const isSpectator = state.isSpectator;
  const result = isLocked ? calcHoleResult(hole) : null;
  const bankerSet = !!hole.banker;
  const validWagers = BET_OPTIONS.filter(v => v >= hole.limitMin && v <= hole.limitMax);
  const nonBankers = state.players.filter(p => p !== hole.banker);
  const allWagersDeclared = bankerSet && nonBankers.every(p => hole.wagers[p] != null);
  const allScoresEntered = bankerSet && state.players.every(p => String(hole.strokes[p]).trim() !== '');
  const readyToLock = allWagersDeclared && allScoresEntered;

  let lockLabel = !bankerSet ? 'Select a Banker First'
    : !allWagersDeclared ? 'All Players Must Declare Wager'
    : !allScoresEntered ? 'Enter All Scores'
    : `Lock Hole ${hole.hole}`;

  let html = `<div class="hole-card ${isLocked?'locked':''}">
    <div class="hole-header">
      <div><span class="hole-label">HOLE</span><span class="hole-num-big">${hole.hole}</span></div>
      <div class="banker-badge"><span style="font-size:16px">🏦</span><span class="banker-name">${hole.banker??'Select Banker'}</span></div>
    </div>`;

  if (!isSpectator) {
    // ① Banker selector
    if (!isLocked) {
      html += `<div class="section"><span class="section-label">① WHO'S THE BANKER?</span>
        <div class="bs-pills">${state.players.map(p =>
          `<button class="bs-pill ${hole.banker===p?'active':''}" onclick="setBanker('${esc(p)}')">${p}</button>`
        ).join('')}</div></div>`;
    }

    // ② Limits
    if (bankerSet && !isLocked) {
      html += `<div class="section"><span class="section-label">② BANKER SETS LIMITS</span>
        <div class="limit-row">
          <div class="limit-field"><label class="limit-label">MIN</label>
            <div class="limit-pills">${BET_OPTIONS.filter(v=>v<=hole.limitMax).map(v=>
              `<button class="lp ${hole.limitMin===v?'active':''}" onclick="setLimit('min',${v})">$${v}</button>`
            ).join('')}</div>
          </div>
          <div class="limit-divider">to</div>
          <div class="limit-field"><label class="limit-label">MAX</label>
            <div class="limit-pills">${BET_OPTIONS.filter(v=>v>=hole.limitMin).map(v=>
              `<button class="lp ${hole.limitMax===v?'active':''}" onclick="setLimit('max',${v})">$${v}</button>`
            ).join('')}</div>
          </div>
        </div>
        ${validWagers.length>0?`<div class="limit-summary">Allowed: ${validWagers.map(v=>`$${v}`).join(', ')} · Max with 3× + banker press: $${hole.limitMax*9}</div>`:''}
      </div>`;
    }

    // ③ Wagers
    if (bankerSet && !isLocked) {
      html += `<div class="section"><span class="section-label">③ PLAYER WAGERS</span>
        ${nonBankers.map(p => `
          <div class="wager-row">
            <span class="wager-name">${p}</span>
            <div class="wager-pills">${validWagers.map(v =>
              `<button class="wp ${hole.wagers[p]===v?'active':''}" onclick="setWager('${esc(p)}',${v})">$${v}</button>`
            ).join('')}</div>
          </div>`).join('')}
      </div>`;
    }
  }

  // ④ Scores + Press (or spectator view)
  if (bankerSet || isSpectator) {
    html += `<div class="section"><span class="section-label">${isLocked?'SCORES & RESULTS': isSpectator ? 'LIVE SCORES' : '④ SCORES & PRESS'}</span>
      <div class="player-rows">`;

    state.players.forEach(p => {
      const resVal = result ? (result[p] ?? 0) : null;
      const chipClass = resVal > 0 ? 'win' : resVal < 0 ? 'loss' : 'push';
      const isBanker = p === hole.banker;
      const press = hole.press[p] || { player: null, banker: false };
      const baseWager = hole.wagers[p];
      const finalWager = baseWager != null ? getFinalWager(baseWager, press) : null;
      const mult = getMultiplier(press);

      html += `<div class="player-row ${isBanker?'is-banker':''}">
        <div class="player-top">
          <div class="player-info">
            <span class="player-name">${p}</span>
            ${isBanker ? `<span class="banker-tag">BANKER</span>` : ''}
            ${!isBanker && baseWager != null ? `<span class="wager-tag">${mult>1?'base $'+baseWager+' → $'+finalWager:'$'+baseWager}</span>` : ''}
          </div>
          <div class="inputs-area">
            <input type="number" inputmode="numeric" pattern="[0-9]*" min="1" max="15"
              class="score-input" ${isLocked||isSpectator?'disabled':''}
              value="${hole.strokes[p]}" placeholder="—"
              onchange="setStroke('${esc(p)}',this.value)"
              oninput="setStroke('${esc(p)}',this.value)" />
            ${isLocked && result!=null ? `<div class="result-chip ${chipClass}">${fmt(resVal)}</div>` : ''}
          </div>
        </div>`;

      // Press buttons
      if (!isBanker && !isLocked && !isSpectator && baseWager != null) {
        const pPress = press.player;
        const bPress = press.banker;
        html += `<div class="press-row">
          <span class="press-label">PRESS:</span>
          <button class="press-btn ${pPress==='press'?'active-press':''}" onclick="togglePress('${esc(p)}','press')">2× Press</button>
          <button class="press-btn ${pPress==='triple'?'active-triple':''}" onclick="togglePress('${esc(p)}','triple')">3× In Air</button>
          <button class="press-btn ${bPress?'active-banker':''}" onclick="toggleBankerPress('${esc(p)}')">🏦 Press</button>
          ${finalWager != null && mult > 1 ? `<span class="final-bet">$${finalWager}</span>` : ''}
        </div>`;
      }

      if (!isBanker && isLocked && baseWager != null) {
        const pPress = press.player;
        const bPress = press.banker;
        const pressDesc = [pPress==='press'?'2× pressed':pPress==='triple'?'3× in air':null, bPress?'🏦 pressed':null].filter(Boolean).join(' + ');
        if (pressDesc) html += `<div class="press-row"><span style="font-size:11px;color:var(--muted)">${pressDesc} → $${finalWager}</span></div>`;
      }

      html += `</div>`;
    });

    html += `</div></div>`;
  }

  // Footer
  if (!isSpectator) {
    html += `<div class="hole-footer">
      ${!isLocked
        ? `<button class="lock-btn" ${readyToLock?'':'disabled'} onclick="lockHole()">${lockLabel}</button>`
        : `<button class="unlock-btn" onclick="unlockHole()">✏️ Edit Hole</button>`}
    </div>`;
  }

  html += `</div>`;
  document.getElementById('hole-card-container').innerHTML = html;
}

// ── Actions ───────────────────────────────────────────────────────────────────
window.setBanker = function(player) {
  const h = state.holes[state.activeHole];
  h.banker = player;
  h.wagers = Object.fromEntries(state.players.map(p => [p, null]));
  h.press = Object.fromEntries(state.players.map(p => [p, { player: null, banker: false }]));
  saveToFirebase(); renderGame();
};

window.setLimit = function(type, value) {
  const h = state.holes[state.activeHole];
  if (type === 'min') { h.limitMin = value; if (h.limitMax < value) h.limitMax = value; }
  else { h.limitMax = value; if (h.limitMin > value) h.limitMin = value; }
  state.players.forEach(p => {
    if (h.wagers[p] != null && (h.wagers[p] < h.limitMin || h.wagers[p] > h.limitMax)) {
      h.wagers[p] = null; h.press[p] = { player: null, banker: false };
    }
  });
  saveToFirebase(); renderGame();
};

window.setWager = function(player, amount) {
  const h = state.holes[state.activeHole];
  h.wagers[player] = amount;
  h.press[player] = { player: null, banker: false };
  saveToFirebase(); renderGame();
};

window.togglePress = function(player, type) {
  const h = state.holes[state.activeHole];
  const current = h.press[player].player;
  h.press[player].player = current === type ? null : type;
  saveToFirebase(); renderGame();
};

window.toggleBankerPress = function(player) {
  const h = state.holes[state.activeHole];
  h.press[player].banker = !h.press[player].banker;
  saveToFirebase(); renderGame();
};

window.setStroke = function(player, value) {
  state.holes[state.activeHole].strokes[player] = value;
  const h = state.holes[state.activeHole];
  const nonBankers = state.players.filter(p => p !== h.banker);
  const allWagersDeclared = !!h.banker && nonBankers.every(p => h.wagers[p] != null);
  const allScoresEntered = !!h.banker && state.players.every(p => String(h.strokes[p]).trim() !== '');
  const readyToLock = allWagersDeclared && allScoresEntered;
  const btn = document.querySelector('.lock-btn');
  if (btn) { btn.disabled = !readyToLock; if (readyToLock) btn.textContent = `Lock Hole ${h.hole}`; }
  saveToFirebase();
  renderLeaderboard();
};

window.lockHole = function() {
  state.holes[state.activeHole].locked = true;
  if (state.activeHole < HOLES - 1) state.activeHole++;
  saveToFirebase(); renderGame();
  setTimeout(() => {
    const nav = document.getElementById('hole-nav');
    if (nav.children[state.activeHole]) nav.children[state.activeHole].scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  }, 100);
};

window.unlockHole = function() {
  state.holes[state.activeHole].locked = false;
  saveToFirebase(); renderGame();
};

// ── Summary ───────────────────────────────────────────────────────────────────
function renderSummary() {
  const totals = calcTotals();
  const sorted = [...state.players].sort((a, b) => totals[b] - totals[a]);
  document.getElementById('summary-card').innerHTML = sorted.map((p, i) => {
    const val = totals[p];
    return `<div class="summary-player">
      <span class="sp-rank ${i===0?'gold':''}">${i+1}</span>
      <span class="sp-name">${p}</span>
      <span class="sp-amount ${val>0?'pos':val<0?'neg':''}">${fmt(val)}</span>
    </div>`;
  }).join('');

  document.getElementById('hole-log').innerHTML = `
    <div class="hole-log-title">HOLE BY HOLE</div>
    ${state.holes.filter(h=>h.locked).map(h => {
      const res = calcHoleResult(h);
      return `<div class="hole-log-row">
        <div class="hlr-top">
          <span class="hlr-hole">H${h.hole}</span>
          <span class="hlr-banker">🏦 ${h.banker}</span>
          <span class="hlr-limit">$${h.limitMin}–$${h.limitMax}</span>
        </div>
        <div class="hlr-results">
          ${state.players.map(p => {
            const v = res ? (res[p] ?? 0) : 0;
            return `<span class="hlr-chip ${v>0?'pos':v<0?'neg':'zero'}">${p}: ${fmt(v)}</span>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('count-pills').innerHTML = [3,4,5].map(n =>
  `<button class="pill ${n===3?'active':''}" onclick="setCount(${n})">${n}</button>`
).join('');
state.playerCount = 3;
renderNameInputs();

// Test Firebase connection
try {
  const testRef = ref(db, '.info/connected');
  onValue(testRef, (snapshot) => {
    console.log('Firebase connected:', snapshot.val());
    document.getElementById('loading').style.display = 'none';
    showScreen('lobby-screen');
  });
  // Fallback: hide spinner after 3 seconds regardless
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    showScreen('lobby-screen');
  }, 3000);
} catch(e) {
  console.error('Firebase error:', e);
  document.getElementById('loading').style.display = 'none';
  showScreen('lobby-screen');
}
</script>
</body>
</html>
